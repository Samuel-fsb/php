<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários em PHP</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column ;
            background-image: linear-gradient(to bottom, rgba(110, 110, 252, 0.799), blue);
            min-height: 100vh;
        }

        h1{
            color: white;
            font-size: 40px;
            font-weight: 400;
        }

        section{
            background-color: white;
            box-shadow: 3px 3px 3px solid;
            border-radius: 5px;
            width: 50%;
            height: 400px;
            box-shadow: 2px 2px 2px solid;
        }

        form{
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        label{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin-top: 30px;
            gap: 10px;
        }

        input{
            padding: 5px;
            width: 50%;
            border-radius: 4px;
            border: 1px solid black;
        }

        button{
            background-color: green;
            color: white;
            padding: 20px;
            font-weight: 400;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Apresente-se Para Nós</h1>
    </header>

    <section>
        <form action="cad.php" method="get">
            <label for="nome">
                Seu Nome:
                <input type="text" name="nome" id="idnome">
        </label>

        <label for="email">
            Seu Email:
            <input type="email" name="email" id="idemail">
        </label>

        <label for="senha">
            Sua Senha:
            <input type="password" name="senha" id="idsenha">
        </label>

        <button type="submit">Entrar na Conta</button>

        </form>
    </sesction>
</body>
</html>
